<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Learning Game 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ===== CSS VARIABLES ===== */
  :root {
    --sky: #74D7F7;
    --sun: #FFD93D;
    --grass: #6BCB77;
    --coral: #FF6B6B;
    --purple: #C77DFF;
    --orange: #FF9A3C;
    --pink: #FF84B7;
    --mint: #4ECDC4;
    --navy: #1A1A4E;
    --white: #FFFEF7;
    --card-shadow: 0 8px 0 rgba(0,0,0,0.15);
    --card-shadow-hover: 0 4px 0 rgba(0,0,0,0.15);
    --radius: 28px;
    --radius-sm: 16px;
  }

  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--sky);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ===== ANIMATED BACKGROUND ===== */
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: linear-gradient(180deg, #74D7F7 0%, #B5EDFF 60%, #D4F7C5 100%);
    overflow: hidden;
  }
  .cloud {
    position: absolute;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
    animation: floatCloud linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud:nth-child(1) { width:120px; height:40px; top:8%; left:-130px; animation-duration:22s; animation-delay:0s; }
  .cloud:nth-child(1)::before { width:60px; height:60px; top:-30px; left:15px; }
  .cloud:nth-child(1)::after  { width:45px; height:45px; top:-20px; left:50px; }
  .cloud:nth-child(2) { width:90px;  height:30px; top:18%; left:-100px; animation-duration:28s; animation-delay:6s; opacity:0.65; }
  .cloud:nth-child(2)::before { width:45px; height:45px; top:-22px; left:10px; }
  .cloud:nth-child(2)::after  { width:35px; height:35px; top:-15px; left:38px; }
  .cloud:nth-child(3) { width:150px; height:48px; top:5%;  left:-160px; animation-duration:35s; animation-delay:12s; }
  .cloud:nth-child(3)::before { width:70px; height:70px; top:-35px; left:20px; }
  .cloud:nth-child(3)::after  { width:55px; height:55px; top:-25px; left:65px; }

  .sun-ball {
    position: fixed; top:-60px; right:-60px;
    width:200px; height:200px;
    background: radial-gradient(circle, #FFE566 40%, #FFD93D 70%, #FFC300 100%);
    border-radius: 50%;
    box-shadow: 0 0 60px 20px rgba(255,211,61,0.4);
    animation: sunPulse 4s ease-in-out infinite;
    z-index: 0;
    pointer-events: none;
  }
  .grass-strip {
    position: fixed; bottom: 0; left:0; right:0; height:80px;
    background: linear-gradient(180deg, #6BCB77 0%, #4CAF50 100%);
    border-radius: 80px 80px 0 0;
    z-index: 0;
    pointer-events: none;
  }
  .grass-strip::before {
    content:'🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼';
    position: absolute; top:-14px; left:0; right:0;
    font-size:22px; letter-spacing:12px;
    white-space: nowrap; overflow: hidden;
  }

  @keyframes floatCloud { from { transform: translateX(0); } to { transform: translateX(calc(100vw + 200px)); } }
  @keyframes sunPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  /* ===== PAGES ===== */
  .page {
    display: none;
    position: relative; z-index: 1;
    min-height: 100vh;
    padding: 20px 16px 120px;
    animation: pageIn 0.4s ease;
  }
  .page.active { display: flex; flex-direction: column; align-items: center; }
  @keyframes pageIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  /* ===== HOME PAGE ===== */
  .home-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.4rem, 8vw, 5rem);
    color: var(--navy);
    text-align: center;
    margin-top: 10px;
    line-height: 1.1;
    text-shadow: 4px 4px 0 rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }
  .home-subtitle {
    font-size: clamp(1rem, 3vw, 1.35rem);
    color: var(--navy);
    opacity: 0.7;
    margin-top: 6px;
    font-weight: 700;
    text-align: center;
  }
  .mascot {
    font-size: clamp(5rem, 18vw, 9rem);
    animation: bounce 2s ease-in-out infinite;
    margin: 10px 0;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
  }
  @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-16px);} }

  .home-cards {
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: 100%;
    max-width: 420px;
    margin-top: 20px;
  }
  .game-card {
    display: flex; align-items: center; gap: 18px;
    padding: 22px 28px;
    border-radius: var(--radius);
    border: none; cursor: pointer;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.4rem, 5vw, 1.8rem);
    color: white;
    box-shadow: var(--card-shadow);
    transition: transform 0.12s, box-shadow 0.12s;
    text-shadow: 1px 2px 0 rgba(0,0,0,0.2);
    position: relative; overflow: hidden;
  }
  .game-card::after {
    content:'';
    position: absolute; top:0; left:0; right:0;
    height: 50%;
    background: rgba(255,255,255,0.15);
    border-radius: var(--radius) var(--radius) 60% 60%;
    pointer-events: none;
  }
  .game-card:active { transform: translateY(4px); box-shadow: var(--card-shadow-hover); }
  .game-card:hover  { transform: translateY(-3px) scale(1.02); }
  .game-card .card-icon { font-size: 2.4rem; flex-shrink: 0; }
  .card-abc   { background: linear-gradient(135deg, #FF6B6B, #FF84B7); }
  .card-num   { background: linear-gradient(135deg, #FFD93D, #FF9A3C); }
  .card-word  { background: linear-gradient(135deg, #6BCB77, #4ECDC4); }
  .card-score { background: linear-gradient(135deg, #C77DFF, #7B2FBE); }

  /* ===== GAME WRAPPER ===== */
  .game-wrapper {
    width: 100%; max-width: 520px;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
  }

  /* ===== HEADER BAR ===== */
  .header-bar {
    width: 100%; display: flex;
    align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(8px);
    border-radius: var(--radius);
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
  }
  .header-bar h2 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    color: var(--navy);
  }
  .score-badge {
    background: var(--sun);
    color: var(--navy);
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    padding: 6px 16px;
    border-radius: 50px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    white-space: nowrap;
  }
  .home-btn {
    background: white;
    border: none; cursor: pointer;
    font-size: 1.5rem;
    width: 44px; height: 44px;
    border-radius: 50%;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    transition: transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .home-btn:active { transform: scale(0.9); }

  /* ===== LETTER / NUMBER DISPLAY ===== */
  .big-display {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 30px 40px;
    text-align: center;
    width: 100%;
    position: relative; overflow: hidden;
  }
  .big-display::before {
    content:'';
    position: absolute; top:0; left:0; right:0;
    height:45%;
    background: rgba(255,255,255,0.5);
    border-radius: var(--radius) var(--radius) 60% 60%;
    pointer-events: none;
  }
  .big-letter {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(5rem, 22vw, 9rem);
    line-height: 1;
    background: linear-gradient(135deg, var(--coral), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(2px 4px 0 rgba(0,0,0,0.1));
  }
  .display-label {
    font-size: 1rem; font-weight: 800;
    color: var(--navy); opacity: 0.55;
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .objects-row {
    display: flex; flex-wrap: wrap;
    justify-content: center; gap: 4px;
    font-size: clamp(2rem, 8vw, 3rem);
    min-height: 60px;
    line-height: 1.3;
  }

  /* ===== OPTIONS GRID ===== */
  .options-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
  }
  .option-btn {
    background: white;
    border: 4px solid transparent;
    border-radius: var(--radius-sm);
    padding: 16px 8px;
    cursor: pointer;
    text-align: center;
    box-shadow: var(--card-shadow);
    transition: transform 0.12s, box-shadow 0.12s, border-color 0.15s;
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .option-btn:hover  { transform: translateY(-3px) scale(1.04); }
  .option-btn:active { transform: translateY(2px); box-shadow: var(--card-shadow-hover); }
  .option-btn .opt-emoji { font-size: clamp(2rem, 8vw, 3rem); }
  .option-btn .opt-label {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(0.85rem, 3vw, 1.1rem);
    color: var(--navy);
  }
  .option-btn.correct {
    border-color: var(--grass);
    background: #F0FFF4;
    animation: popIn 0.3s ease;
  }
  .option-btn.wrong {
    border-color: var(--coral);
    background: #FFF5F5;
    animation: shake 0.4s ease;
  }
  @keyframes popIn { 0%{transform:scale(0.9);} 50%{transform:scale(1.12);} 100%{transform:scale(1);} }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }

  /* ===== WORD DISPLAY ===== */
  .word-display {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 22px 40px;
    text-align: center;
    width: 100%;
  }
  .big-word {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.8rem, 12vw, 5rem);
    background: linear-gradient(135deg, var(--mint), #1A6980);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 4px;
  }

  /* ===== FEEDBACK BANNER ===== */
  .feedback {
    width: 100%; text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.4rem, 5vw, 2rem);
    padding: 16px;
    border-radius: var(--radius-sm);
    animation: slideDown 0.3s ease;
    box-shadow: var(--card-shadow);
  }
  @keyframes slideDown { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
  .feedback.correct-fb { background: #D4EDDA; color: #276738; }
  .feedback.wrong-fb   { background: #FDDEDE; color: #8B1A1A; }
  .feedback.hidden { display: none; }

  /* ===== NEXT / ACTION BUTTONS ===== */
  .action-btn {
    background: linear-gradient(135deg, var(--coral), var(--orange));
    color: white; border: none; cursor: pointer;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 4vw, 1.5rem);
    padding: 16px 40px;
    border-radius: 50px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.18);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.5px;
  }
  .action-btn:hover  { transform: translateY(-2px); }
  .action-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.18); }
  .action-btn.green  { background: linear-gradient(135deg, var(--grass), var(--mint)); }
  .action-btn.purple { background: linear-gradient(135deg, var(--purple), #7B2FBE); }

  /* ===== PROGRESS DOTS ===== */
  .progress-dots {
    display: flex; gap: 10px; justify-content: center;
  }
  .dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: rgba(255,255,255,0.5);
    border: 2px solid rgba(255,255,255,0.8);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.done { background: var(--sun); transform: scale(1.2); }
  .dot.current { background: var(--coral); transform: scale(1.3); }

  /* ===== SCORE PAGE ===== */
  .score-page-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--card-shadow);
    padding: 32px 28px;
    width: 100%; max-width: 420px;
    text-align: center;
  }
  .score-page-card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 7vw, 2.8rem);
    color: var(--navy);
    margin-bottom: 8px;
  }
  .total-score {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(3.5rem, 15vw, 6rem);
    background: linear-gradient(135deg, var(--coral), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin: 10px 0;
  }
  .score-breakdown {
    display: flex; flex-direction: column; gap: 10px;
    margin: 20px 0;
  }
  .score-row {
    display: flex; align-items: center; justify-content: space-between;
    background: #F8F9FF; border-radius: var(--radius-sm);
    padding: 12px 18px;
  }
  .score-row .row-label { font-weight: 800; color: var(--navy); font-size: 1rem; }
  .score-row .row-val {
    font-family: 'Fredoka One', cursive; font-size: 1.3rem;
    color: var(--coral);
  }
  .star-row { display: flex; justify-content: center; gap: 6px; margin: 16px 0; }
  .star-row span { font-size: 2.4rem; animation: starPop 0.4s ease both; }
  .star-row span:nth-child(2) { animation-delay:0.1s; }
  .star-row span:nth-child(3) { animation-delay:0.2s; }
  @keyframes starPop { from{opacity:0;transform:scale(0);} to{opacity:1;transform:scale(1);} }

  /* ===== CONFETTI ===== */
  #confetti-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9999;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 360px) {
    .options-grid { gap: 8px; }
    .option-btn { padding: 10px 4px; }
    .big-letter { font-size: 4.5rem; }
  }
  @media (min-width: 600px) {
    .page { max-width: 580px; margin: 0 auto; }
  }

  /* ===== STARS DECORATION ===== */
  .deco-stars {
    position: fixed; top:0; left:0; right:0; bottom:0;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .deco-star {
    position: absolute;
    opacity: 0.35;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle { 0%,100%{opacity:0.2;transform:scale(1);} 50%{opacity:0.5;transform:scale(1.3);} }

  /* ===== NUMBER OPTIONS ===== */
  .num-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
  }
  .num-btn {
    background: white;
    border: 4px solid transparent;
    border-radius: var(--radius-sm);
    padding: 20px 8px;
    cursor: pointer;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 8vw, 3.2rem);
    color: var(--navy);
    box-shadow: var(--card-shadow);
    transition: transform 0.12s, box-shadow 0.12s;
    text-align: center;
  }
  .num-btn:hover  { transform: translateY(-3px) scale(1.05); }
  .num-btn:active { transform: translateY(2px); box-shadow: var(--card-shadow-hover); }
  .num-btn.correct { border-color: var(--grass); background:#F0FFF4; animation: popIn 0.3s ease; }
  .num-btn.wrong   { border-color: var(--coral); background:#FFF5F5; animation: shake 0.4s ease; }

  /* ===== GAME COMPLETE BANNER ===== */
  .complete-banner {
    background: linear-gradient(135deg, var(--sun), var(--orange));
    color: var(--navy);
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    padding: 18px;
    border-radius: var(--radius-sm);
    text-align: center;
    box-shadow: var(--card-shadow);
    width: 100%;
  }
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-layer">
  <div class="cloud"></div>
  <div class="cloud"></div>
  <div class="cloud"></div>
</div>
<div class="sun-ball"></div>
<div class="grass-strip"></div>
<div class="deco-stars" id="decoStars"></div>
<canvas id="confetti-canvas"></canvas>

<!-- ====================== HOME PAGE ====================== -->
<div class="page active" id="page-home">
  <div class="home-title">🌟 Kids Learning<br>Game 🎮</div>
  <div class="home-subtitle">Tap a game to start playing!</div>
  <div class="mascot">🦁</div>
  <div class="home-cards">
    <button class="game-card card-abc" onclick="goTo('abc')">
      <span class="card-icon">🔤</span>
      <span>Learn ABC</span>
    </button>
    <button class="game-card card-num" onclick="goTo('numbers')">
      <span class="card-icon">🔢</span>
      <span>Learn Numbers</span>
    </button>
    <button class="game-card card-word" onclick="goTo('words')">
      <span class="card-icon">🖼️</span>
      <span>Word Match</span>
    </button>
    <button class="game-card card-score" onclick="goTo('score')">
      <span class="card-icon">🏆</span>
      <span>My Scores</span>
    </button>
  </div>
</div>

<!-- ====================== ABC GAME ====================== -->
<div class="page" id="page-abc">
  <div class="game-wrapper">
    <div class="header-bar">
      <button class="home-btn" onclick="goHome()" title="Home">🏠</button>
      <h2>🔤 ABC Game</h2>
      <div class="score-badge">⭐ <span id="abc-score">0</span></div>
    </div>
    <div class="progress-dots" id="abc-dots"></div>
    <div class="big-display">
      <div class="display-label">Which picture starts with…</div>
      <div class="big-letter" id="abc-letter">A</div>
    </div>
    <div class="feedback hidden" id="abc-feedback"></div>
    <div class="options-grid" id="abc-options"></div>
    <button class="action-btn" id="abc-next" onclick="nextABC()" style="display:none">
      Next Question ➡️
    </button>
  </div>
</div>

<!-- ====================== NUMBERS GAME ====================== -->
<div class="page" id="page-numbers">
  <div class="game-wrapper">
    <div class="header-bar">
      <button class="home-btn" onclick="goHome()" title="Home">🏠</button>
      <h2>🔢 Count It!</h2>
      <div class="score-badge">⭐ <span id="num-score">0</span></div>
    </div>
    <div class="progress-dots" id="num-dots"></div>
    <div class="big-display">
      <div class="display-label">How many are there? 👇</div>
      <div class="objects-row" id="num-objects"></div>
    </div>
    <div class="feedback hidden" id="num-feedback"></div>
    <div class="num-options" id="num-options"></div>
    <button class="action-btn green" id="num-next" onclick="nextNumbers()" style="display:none">
      Next Question ➡️
    </button>
  </div>
</div>

<!-- ====================== WORD MATCH ====================== -->
<div class="page" id="page-words">
  <div class="game-wrapper">
    <div class="header-bar">
      <button class="home-btn" onclick="goHome()" title="Home">🏠</button>
      <h2>🖼️ Word Match</h2>
      <div class="score-badge">⭐ <span id="word-score">0</span></div>
    </div>
    <div class="progress-dots" id="word-dots"></div>
    <div class="word-display">
      <div class="display-label">Find the picture for…</div>
      <div class="big-word" id="word-display-text">CAT</div>
    </div>
    <div class="feedback hidden" id="word-feedback"></div>
    <div class="options-grid" id="word-options"></div>
    <button class="action-btn purple" id="word-next" onclick="nextWords()" style="display:none">
      Next Question ➡️
    </button>
  </div>
</div>

<!-- ====================== SCORE PAGE ====================== -->
<div class="page" id="page-score">
  <div class="game-wrapper">
    <div class="header-bar">
      <button class="home-btn" onclick="goHome()" title="Home">🏠</button>
      <h2>🏆 My Scores</h2>
      <div class="score-badge">🎯 Total</div>
    </div>
    <div class="score-page-card">
      <h2>Amazing Work! 🎉</h2>
      <div class="star-row">
        <span id="star1">☆</span>
        <span id="star2">☆</span>
        <span id="star3">☆</span>
      </div>
      <div class="total-score" id="total-score-display">0</div>
      <div style="font-weight:800; color:var(--navy); opacity:0.6; margin-bottom:14px; font-size:1rem;">Total Points</div>
      <div class="score-breakdown">
        <div class="score-row">
          <span class="row-label">🔤 ABC Game</span>
          <span class="row-val" id="breakdown-abc">0 pts</span>
        </div>
        <div class="score-row">
          <span class="row-label">🔢 Numbers</span>
          <span class="row-val" id="breakdown-num">0 pts</span>
        </div>
        <div class="score-row">
          <span class="row-label">🖼️ Word Match</span>

// ── Audio (Web Audio API) ────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}
function playTone(freq, type, dur, vol) {
  vol = vol || 0.3;
  try {
    const ctx = getAudio(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
function playCorrect() {
  playTone(523.25, 'sine', 0.15, 0.3);
  setTimeout(function(){ playTone(659.25, 'sine', 0.15, 0.3); }, 120);
  setTimeout(function(){ playTone(783.99, 'sine', 0.25, 0.3); }, 240);
}
function playWrong() {
  playTone(330, 'sawtooth', 0.12, 0.25);
  setTimeout(function(){ playTone(261.63, 'sawtooth', 0.18, 0.25); }, 130);
}
function playWhoosh() {
  playTone(880, 'sine', 0.08, 0.12);

// ── Confetti ─────────────────────────────────────────────────────────
var cfCanvas = document.getElementById('confetti-canvas');
var cfCtx = cfCanvas.getContext('2d');
var confettis = [];
var cfAnimId = null;
var COLORS = ['#FF6B6B','#FFD93D','#6BCB77','#74D7F7','#C77DFF','#FF9A3C','#FF84B7','#4ECDC4','#fff'];

function resizeCanvas() {
  cfCanvas.width  = window.innerWidth;
  cfCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function launchConfetti() {
  confettis = [];
  for (var i = 0; i < 90; i++) {
    confettis.push({
      x: Math.random() * cfCanvas.width,
      y: Math.random() * cfCanvas.height * 0.25 - 10,
      w: Math.random() * 13 + 6,
      h: Math.random() * 7 + 4,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      rot: Math.random() * Math.PI * 2,
      vx: (Math.random() - 0.5) * 5,
      vy: Math.random() * 4 + 2,
      vrot: (Math.random() - 0.5) * 0.18,
      life: 1
    });
  }
  if (cfAnimId) cancelAnimationFrame(cfAnimId);
  function step() {
    cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
    var alive = false;
    for (var i = 0; i < confettis.length; i++) {
      var p = confettis[i];
      p.x += p.vx; p.y += p.vy;
      p.rot += p.vrot; p.vy += 0.12;
      p.life -= 0.013;
      if (p.life > 0) {
        alive = true;
        cfCtx.save();
        cfCtx.globalAlpha = Math.max(0, p.life);
        cfCtx.translate(p.x, p.y);
        cfCtx.rotate(p.rot);
        cfCtx.fillStyle = p.color;
        cfCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        cfCtx.restore();
      }
    }
    if (alive) cfAnimId = requestAnimationFrame(step);
    else cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
  }
  cfAnimId = requestAnimationFrame(step);
}

// ── Utility ───────────────────────────────────────────────────────────
function shuffleArr(a) {
  var b = a.slice();
  for (var i = b.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = b[i]; b[i] = b[j]; b[j] = t;
  }
  return b;
}
function pickRandom(arr, n) {
  return shuffleArr(arr).slice(0, n);
}

// ── Navigation ────────────────────────────────────────────────────────
function goTo(id) {
  playWhoosh();
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  var target = document.getElementById('page-' + id);
  if (target) target.classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'abc')     startABC();
  if (id === 'numbers') startNumbers();
  if (id === 'words')   startWords();
  if (id === 'score')   updateScorePage();
}
function goHome() {
  playWhoosh();
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('page-home').classList.add('active');
  window.scrollTo(0, 0);
}

// ── Progress dots ─────────────────────────────────────────────────────
function renderDots(containerId, total, current) {
  var el = document.getElementById(containerId);
  el.innerHTML = '';
  for (var i = 0; i < total; i++) {
    var d = document.createElement('div');
    if (i < current) d.className = 'dot done';
    else if (i === current) d.className = 'dot current';
    else d.className = 'dot';
    el.appendChild(d);
  }
}

function showFeedback(id, correct) {
  var el = document.getElementById(id);

  if (correct) {
    el.className = 'feedback correct-fb';
    el.textContent = correctMessages[Math.floor(Math.random() * correctMessages.length)];
  } else {
    el.className = 'feedback wrong-fb';

  }
}

function loadNumbers() {
  if (numIdx >= numQueue.length) {
    showGameComplete('numbers');
    return;
  }
  numLocked = false;
  var q = numQueue[numIdx];
  document.getElementById('num-feedback').className = 'feedback hidden';
  document.getElementById('num-next').style.display = 'none';
  renderDots('num-dots', QUESTIONS_PER_ROUND, numIdx);

  // Build objects display
  var objHTML = '';
  for (var i = 0; i < q.number; i++) {
    objHTML += q.emoji + ' ';
  }
  document.getElementById('num-objects').textContent = objHTML.trim();

  // Generate 3 unique choices
  var choices = [q.number];
  var attempts = 0;
  while (choices.length < 3 && attempts < 30) {
    attempts++;
    var offset = Math.floor(Math.random() * 3) + 1;
    var c = q.number + (Math.random() < 0.5 ? offset : -offset);
    c = Math.max(1, Math.min(10, c));
    if (choices.indexOf(c) === -1) choices.push(c);
  }
  // Fallback if not enough choices
  for (var n = 1; n <= 10 && choices.length < 3; n++) {
    if (choices.indexOf(n) === -1) choices.push(n);
  }
  choices = shuffleArr(choices);

  var grid = document.getElementById('num-options');
  grid.innerHTML = '';
  choices.forEach(function(n) {
    var btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = n;
    btn.addEventListener('click', function(){ answerNumbers(btn, n, q.number); });
    grid.appendChild(btn);
  });

  numLocked = true;

    scores.numbers += 10;

    showFeedback('num-feedback', true);

    playWrong();
    showFeedback('num-feedback', false);

      if (parseInt(b.textContent) === correct) b.classList.add('correct');

  numIdx++;

/* =================================================================

   ================================================================= */
function showGameComplete(game) {
  // Show a completion banner then redirect
  var pageId = game === 'abc' ? 'page-abc' : game === 'numbers' ? 'page-numbers' : 'page-words';
  var wrapper = document.querySelector('#' + pageId + ' .game-wrapper');
  var banner = document.createElement('div');
  banner.className = 'complete-banner';
  var pts = game === 'abc' ? scores.abc : game === 'numbers' ? scores.numbers : scores.words;
  banner.textContent = '🎉 Game Over! You scored ' + pts + ' points!';
  wrapper.appendChild(banner);
  launchConfetti(); playCorrect();
  setTimeout(function() {
    wrapper.removeChild(banner);
    goTo('score');
  }, 1800);
}

/* =================================================================
   SCORE PAGE
   ================================================================= */
function updateScorePage() {
  var total = scores.abc + scores.numbers + scores.words;
  document.getElementById('total-score-display').textContent = total;
  document.getElementById('breakdown-abc').textContent  = scores.abc  + ' pts';
  document.getElementById('breakdown-num').textContent  = scores.numbers + ' pts';
  document.getElementById('breakdown-word').textContent = scores.words + ' pts';

  var maxPossible = QUESTIONS_PER_ROUND * 10 * 3;
  var pct = maxPossible > 0 ? total / maxPossible : 0;

  document.getElementById('star1').textContent = pct >= 0.15 ? '⭐' : '☆';
  document.getElementById('star2').textContent = pct >= 0.45 ? '⭐' : '☆';
  document.getElementById('star3').textContent = pct >= 0.75 ? '⭐' : '☆';

  if (pct >= 0.4) { setTimeout(launchConfetti, 300); }
}

function resetAllScores() {
  scores.abc = 0; scores.numbers = 0; scores.words = 0;
  updateScorePage();
  playWhoosh();
}

    s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    s.style.left = Math.random() * 96 + 'vw';
    s.style.top  = Math.random() * 78 + 'vh';
    s.style.animationDelay = (Math.random() * 3).toFixed(2) + 's';
    s.style.fontSize = (0.8 + Math.random() * 1.4).toFixed(2) + 'rem';
    c.appendChild(s);
  }
})();
</script>
</body>
